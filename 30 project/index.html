<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Search Engine</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2a1b5c, #3e2a8c);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 50px 20px;
  }

  h1 {
    margin-bottom: 30px;
    font-weight: normal;
  }

  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 40px;
  }

  .search-bar input {
    padding: 10px 15px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    width: 250px;
  }

  .search-bar button {
    padding: 10px 20px;
    background-color: #f25c6d;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 1000px;
  }

  .gallery img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    transition: transform 0.3s;
  }

  .gallery img:hover {
    transform: scale(1.05);
  }

  /* Optional: play icons overlay (როგორც სურათში) */
  .gallery-item {
    position: relative;
  }

  .gallery-item::after {
    content: "▶";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    color: rgba(255,255,255,0.7);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .gallery-item:hover::after {
    opacity: 1;
  }
</style>
</head>
<body>

<h1>image search engine</h1>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search images...">
  <button onclick="searchImages()">Search</button>
</div>

<div class="gallery" id="gallery">
  <!-- სურათები აქ ჩაეტანება JS-ის მეშვეობით -->
</div>

<script>
  const images = [
    'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=60',
    'https://images.unsplash.com/photo-1507149833265-60c372daea22?auto=format&fit=crop&w=800&q=60',
    'https://images.unsplash.com/photo-1518837695005-2083093ee35b?auto=format&fit=crop&w=800&q=60',
    'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=60',
    'https://images.unsplash.com/photo-1483794344563-d27a8d004d37?auto=format&fit=crop&w=800&q=60',
    'https://images.unsplash.com/photo-1493244040629-496f6d136cc3?auto=format&fit=crop&w=800&q=60'
  ];

  const gallery = document.getElementById('gallery');

  function displayImages(filtered = images) {
    gallery.innerHTML = '';
    filtered.forEach(src => {
      const div = document.createElement('div');
      div.className = 'gallery-item';
      const img = document.createElement('img');
      img.src = src;
      div.appendChild(img);
      gallery.appendChild(div);
    });
  }

  displayImages();

  function searchImages() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = images.filter(img => img.includes(query));
    displayImages(filtered);
  }
</script>

</body>
</html>
