<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stopwatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stopwatch">
    <div id="display">00:00:00</div>

    <div class="buttons">
      <button id="stop">⏸</button>
      <button id="start">▶</button>
      <button id="reset">↻</button>
    </div>
  </div>

  <!-- JS აუცილებლად აქ, ბოლოში -->
  <script src="script.js"></script>
</body>
</html>
