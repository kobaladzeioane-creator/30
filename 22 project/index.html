<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMBOCALAMBO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="img-box">
        <img src="transparent.png" width="100%">

        <div class="img-wrap">
            <img src="original.jpg" id="originalImg">
        </div>

        <span id="line">
            <img src="arrow.png" class="arrow">
        </span>
    </div>
</div>

<script>
    var imgBox = document.querySelector(".img-box");
    var imgWrap = document.querySelector(".img-wrap");
    var originalImg = document.getElementById("originalImg");
    var line = document.getElementById("line");

    originalImg.style.width = imgBox.offsetWidth + "px";

    var leftSpace = imgBox.offsetLeft;

    imgBox.onmousemove = function(e){
        var x = e.pageX - leftSpace;

        if (x < 0) x = 0;
        if (x > imgBox.offsetWidth) x = imgBox.offsetWidth;

        imgWrap.style.width = x + "px";
        line.style.left = x + "px";
    }
</script>

</body>
</html>
