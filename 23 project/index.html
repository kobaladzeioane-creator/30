<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Calendar Using JavaScript</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calendar">
    <div class="left">
      <h1 id="date">13</h1>
      <p id="day">Tuesday</p>
    </div>
    <div class="right">
      <p id="month">June</p>
      <p id="year">2023</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
