<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Landing Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <div class="logo">🌙</div>
      <ul class="menu">
        <li><a href="#">Market</a></li>
        <li><a href="#">Features</a></li>
        <li><a href="#">White Papers</a></li>
        <li><a href="#">About Us</a></li>
      </ul>
      <button class="lang-btn">EN</button>
    </nav>
  </header>

  <main>
    <div class="content">
      <h1>BUY & <span>SELL Crypto</span></h1>
      <p>World’s biggest Cryptocurrency exchange available on web as well as mobile phone.</p>
      <button class="explore-btn">EXPLORE MORE</button>
    </div>
    <div class="illustration">
      <!-- შეგიძლია აქ გამოიყენო ნებისმიერი PNG ან SVG -->
      <img src="crypto-illustration.png" alt="Crypto Illustration">
    </div>
  </main>

  <footer>
    <div class="crypto-prices">
      <div class="crypto">
        <span>Bitcoin</span>
        <span>$64811</span>
      </div>
      <div class="crypto">
        <span>Ethereum</span>
        <span>$3873.4</span>
      </div>
      <div class="crypto">
        <span>Dogecoin</span>
        <span>$0.179935</span>
      </div>
    </div>
  </footer>
</body>
</html>
